<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Shorts</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
    height:100vh;
    font-family:Arial,sans-serif;
}

/* كل فيديو */
.short{
    width:100%;
    height:100vh;
    position:relative;
    scroll-snap-align:start;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

.short video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* النص */
.overlay{
    position:absolute;
    bottom:40px;
    left:20px;
    color:#fff;
    z-index:10;
}

.title{
    font-size:22px;
    font-weight:bold;
}

.desc{
    font-size:14px;
    opacity:.8;
}

/* اسم الموقع */
.logo{
    position:fixed;
    top:15px;
    left:15px;
    color:white;
    font-size:18px;
    font-weight:bold;
    z-index:999;
    background:rgba(0,0,0,.4);
    padding:8px 15px;
    border-radius:20px;
    backdrop-filter:blur(10px);
}
</style>
</head>

<body>

<div class="logo">MY SHORTS</div>

<div class="short">
    <video autoplay muted loop playsinline>
        <source src="videos/1 (1).mp4" type="video/mp4">
    </video>
    <div class="overlay">
        <div class="title">Video 1</div>
        <div class="desc">Awesome Short Video</div>
    </div>
</div>

<div class="short">
    <video autoplay muted loop playsinline>
        <source src="videos/2.mp4" type="video/mp4">
    </video>
    <div class="overlay">
        <div class="title">Video 2</div>
        <div class="desc">Second Short Video</div>
    </div>
</div>

<div class="short">
    <video autoplay muted loop playsinline>
        <source src="videos/3.mp4" type="video/mp4">
    </video>
    <div class="overlay">
        <div class="title">Video 3</div>
        <div class="desc">Third Short Video</div>
    </div>
</div>

<div class="short">
    <video autoplay muted loop playsinline>
        <source src="videos/4.mp4" type="video/mp4">
    </video>
    <div class="overlay">
        <div class="title">Video 4</div>
        <div class="desc">Fourth Video</div>
    </div>
</div>

<div class="short">
    <video autoplay muted loop playsinline>
        <source src="videos/jan.mp4" type="video/mp4">
    </video>
    <div class="overlay">
        <div class="title">Video Jan</div>
        <div class="desc">Fifth Video</div>
    </div>
</div>

</body>
</html>
