<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Shorts</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
    height:100vh;
    font-family:Arial,sans-serif;
}

.short{
    width:100%;
    height:100vh;
    position:relative;
    scroll-snap-align:start;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

.short video{
    width:100%;
    height:100%;
    object-fit:cover;
}

.overlay{
    position:absolute;
    bottom:30px;
    left:20px;
    color:#fff;
    z-index:10;
}

.title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:8px;
}

.desc{
    font-size:14px;
    opacity:.9;
}

.logo{
    position:fixed;
    top:15px;
    left:15px;
    color:white;
    font-size:20px;
    font-weight:bold;
    z-index:999;
    background:rgba(0,0,0,.4);
    padding:8px 15px;
    border-radius:20px;
    backdrop-filter:blur(10px);
}

.actions{
    position:absolute;
    right:15px;
    bottom:120px;
    display:flex;
    flex-direction:column;
    gap:15px;
    z-index:10;
}

.btn{
    width:55px;
    height:55px;
    border-radius:50%;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(10px);
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:24px;
}
</style>
</head>

<body>

<div class="logo">MY SHORTS</div>

<div class="short">
    <video autoplay muted loop controls playsinline>
        <source src="videos/video1.mp4" type="video/mp4">
    </video>

    <div class="overlay">
        <div class="title">Video 1</div>
        <div class="desc">Awesome Short Video</div>
    </div>

    <div class="actions">
        <div class="btn">❤️</div>
        <div class="btn">💬</div>
        <div class="btn">📤</div>
    </div>
</div>

<div class="short">
    <video autoplay muted loop controls playsinline>
        <source src="videos/video2.mp4" type="video/mp4">
    </video>

    <div class="overlay">
        <div class="title">Video 2</div>
        <div class="desc">Second Short Video</div>
    </div>

    <div class="actions">
        <div class="btn">❤️</div>
        <div class="btn">💬</div>
        <div class="btn">📤</div>
    </div>
</div>

<div class="short">
    <video autoplay muted loop controls playsinline>
        <source src="videos/video3.mp4" type="video/mp4">
    </video>

    <div class="overlay">
        <div class="title">Video 3</div>
        <div class="desc">Third Short Video</div>
    </div>

    <div class="actions">
        <div class="btn">❤️</div>
        <div class="btn">💬</div>
        <div class="btn">📤</div>
    </div>
</div>

</body>
</html>
