<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Gallery</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:white;
}

h1{
    text-align:center;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:10px;
}

.card{
    position:relative;
    border-radius:15px;
    overflow:hidden;
    cursor:pointer;
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
    display:block;
    filter:brightness(0.7);
}

.card span{
    position:absolute;
    bottom:10px;
    left:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>My Videos</h1>

<div class="grid">

    <div class="card" onclick="location.href='video1.html'">
        <img src="thumb1.jpg">
        <span>Video 1</span>
    </div>

    <div class="card" onclick="location.href='video2.html'">
        <img src="thumb2.jpg">
        <span>Video 2</span>
    </div>

    <div class="card" onclick="location.href='video3.html'">
        <img src="thumb3.jpg">
        <span>Video 3</span>
    </div>

    <div class="card" onclick="location.href='video4.html'">
        <img src="thumb4.jpg">
        <span>Video 4</span>
    </div>

</div>

</body>
</html>
